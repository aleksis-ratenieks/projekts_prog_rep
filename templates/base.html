<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Datoru noslogojuma sistēma</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
    <a href="/">Sākums</a>
    <a href="/datori">Datori</a>
    <a href="/lietotaji">Lietotāji</a>
    <a href="/statistika">Statistika</a>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash">
        {% for category, message in messages %}
        <p class="{{ category }}">{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}
{% endwith %}

<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
